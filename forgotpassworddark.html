<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Forgot Password</title>
	<link rel="stylesheet" href="forgotdark.css">
</head>
<body>
	<div class="container">

    <!-- TOP BAR -->
    <div class="topbar">
        <div class="logo">
            <img src="Icons used/Icons used/Wallet.png" class="logo-img">
            <span>EWallet</span>
        </div>

        <div class="top-icons">

        	<!--Toggle Switch-->
        	<div class="toggle-container">
        		<label class="switch">
        			<input type="checkbox" id="mode-toggle">
        			<span class="slider round"></span>
        		</label>
        	</div>

        	<!--Notification Icon-->
            <div class="icon-circle">
                <img src="Icons used/Icons used/notificationbell.png">
            </div>
            <div class="icon-circle">
                <img src="Icons used/Icons used/userprofile.png">
            </div>
            <div class="user-info">
                <p>Username</p>
                <span>email@xyz.com</span>
            </div>
        </div>
    </div>

    <!-- CENTER CARD -->
    <div class="card">
        <div class="icon-box">
            <img src="Icons used/Icons used/Wallet.png">
        </div>

        <h2>EWallet</h2>

        <div class="form-box">
            <h3>Reset your password</h3>

            <label>Enter your email:</label>
            <input type="email" id="email">

            <label>Enter new password:</label>
            <input type="password" id="newPass">

            <label>Re-type password:</label>
            <input type="password" id="confirmPass">

            <button onclick="resetPassword()">Back to Login</button>
        </div>
    </div>

</div>

<script src="forgot.js"></script>

<!-- DARK MODE TOGGLE SCRIPT -->
<script>
const modeToggle = document.getElementById('mode-toggle');

// Dark mode page always loads in dark mode
modeToggle.checked = true;

// Toggle listener
modeToggle.addEventListener('change', () => {
    if(!modeToggle.checked){
        localStorage.setItem('mode', 'light');
        window.location.href = 'forgot-password.html';
    }
});
</script>

</body>
</html>
