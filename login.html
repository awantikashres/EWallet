<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Login Page - EWallet</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header"> 
    <img src="Icons used/Icons used/Wallet.png" class="header-icon" alt="Wallet Icon"> EWallet </div>

    <div class="login-wrapper">
        <div class="login-container">

        	<!-- <img src="Icons used/Icons used/Wallet.png" alt="Wallet Icon" class="wallet-icon"> -->

            <h2>Welcome Back</h2>

            <img src="Icons used/Icons used/Wallet.png" alt="Wallet Icon" class="wallet-icon">

            <form onsubmit="return loginUser()">

                <label>Email Address:</label>
                <div class="input-wrapper">
                	<img src="Icons used/Icons used/username.png" class="input-icon" alt="User Icon">
                	<input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <!-- <input type="email" required> -->

                <label>Password:</label>
                <div class="input-wrapper">
                	<img src="Icons used/Icons used/Lock.png" class="input-icon" alt="Lock Icon">
                	<input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <!-- <input type="password" required> -->

                <div class="forgot">Forgot Password?</div>

                <button type="submit">Log In</button>

            </form>

        </div>
    </div>

<script src="script.js"></script>

</body>
</html>
